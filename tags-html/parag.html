<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARAGRÁFOS</title>
</head>
<body>
    <p>Esse é um paragráfo e não importa como eu escrevo<br> ele nunca quebra a linha<br> a não ser quando usamos a tag 'br' </p>
    <p><strong>é um texto em NEGRITO</strong></p>
    <p><em>Esse é uma tag para dar enfase a um texto</em></p>
    <p>Minha casa tem 80m<sup>2</sup></p>
    <p>A composição quimica da agua é H<sub>2</sub>O</p>
</body>
</html>
